name: InternFlow CI Pipeline

# Ne zaman tetiklensin?
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---- BACKEND TESTLERİ ----
  backend-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./internflow_backend

    steps:
      # 1. Kodu çek
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python kur
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Bağımlılıkları yükle
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      # 4. Kod kalitesi kontrolü (Linting)
      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-line-length=120 --statistics --exit-zero

      # 5. Testleri çalıştır + coverage raporu
      - name: Run tests with coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pytest tests/ -v --co 2>/dev/null && pytest tests/ -v --cov=app --cov-report=term-missing || echo "No tests found or tests failed"

  # ---- FRONTEND BUILD KONTROLÜ ----
  frontend-build:
    name: Frontend - Flutter Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./internflow_frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: Run Flutter tests
        run: flutter test || echo "No tests found"