name: InternFlow CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---- BACKEND TESTLERİ ----
  backend-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./internflow_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio flake8

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-line-length=120 --statistics --exit-zero

      - name: Run tests with coverage
        env:
          SUPABASE_URL: https://fake-test.supabase.co
          SUPABASE_KEY: fake-test-key-for-ci-only
          SUPABASE_SERVICE_KEY: fake-test-service-key-for-ci-only
          GEMINI_MODE: stub
          GEMINI_API_KEY: ""
          EMBEDDING_MODE: local
          HF_API_TOKEN: fake-hf-token-for-ci
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60

  # ---- FRONTEND BUILD KONTROLÜ ----
  frontend-build:
    name: Frontend - Flutter Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./internflow_frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter tests
        run: |
          if [ -d "test" ] && [ "$(find test -name '*_test.dart' | head -1)" ]; then
             flutter test
          else
           echo "No Flutter tests found - skipping"
          fi